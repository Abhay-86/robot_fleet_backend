services:

  db:
    image: postgres:15
    container_name: atomic_db
    restart: always

    environment:
      POSTGRES_DB: fleet_manager_db
      POSTGRES_USER: fleet_manager_user
      POSTGRES_PASSWORD: fleet_manager_password

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_manager_user -d fleet_manager_db"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - fleet_network


  redis:
    image: redis:8-alpine
    container_name: atomic_redis
    restart: always

    volumes:
      - redis_data:/data

    ports:
      - "6379:6379"

    command: ["redis-server", "--appendonly", "yes"]

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

    networks:
      - fleet_network


  zenoh-router:
    image: eclipse/zenoh:1.3.3
    container_name: atomic_zenoh
    restart: always

    ports:
      - "7447:7447"

    networks:
      - fleet_network


volumes:
  postgres_data:
  redis_data:


networks:
  fleet_network:
    name: fleet_backend_fleet_network
    driver: bridge

